kind = "web"
previewPath = "/"
title = "Python Game"
version = "1.0.0"
id = "artifacts/game-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18709

[services.development]
run = "pnpm --filter @workspace/game-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/game-ui", "run", "build" ]
publicDir = "artifacts/game-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18709"
BASE_PATH = "/"
